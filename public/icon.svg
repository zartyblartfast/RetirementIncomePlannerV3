<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Upward trend line -->
  <polyline points="96,384 192,320 288,280 384,200 416,160"
    fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow head -->
  <polygon points="416,160 380,180 396,196" fill="white"/>
  <!-- Pound sign -->
  <text x="256" y="460" font-family="Arial,sans-serif" font-size="80" font-weight="bold"
    fill="white" fill-opacity="0.6" text-anchor="middle">£</text>
</svg>
